<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BackBuddy</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="brand">
      <img src="icon.ico" alt="BackBuddy logo" class="logo" />
      <h1>BackBuddy</h1>
    </div>
    
    <p class="tagline">
      Stay mindful. Sit straight. Breathe better.🦋
    </p>

    <div class="card">
      <div id="statusBadge" class="status-badge">Status: Inactive</div>

      <label for="interval">⏰ Reminder Interval (mins):</label>
      <input type="number" id="interval" min="1" placeholder="e.g. 30" />

      <label for="message">💬 Reminder Message:</label>
      <input type="text" id="message" placeholder="e.g. Sit up!" />

      <div class="actions">
        <button id="toggleBtn">Start Reminders</button>
      </div>

      <a href="#" id="testNotificationLink" class="test-link">Send Test Notification</a>
    </div>

    <footer>
      <p>Made with 💻 by <a href="https://github.com/arch5d" target="_blank" style="color: inherit; text-decoration: underline;">Archita Dayal</a></p>
      <p>Version: 1.0.0</p>
    </footer>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
